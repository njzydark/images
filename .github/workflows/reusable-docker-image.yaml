name: Reusable Docker Image Build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      skip_if_image_revision_matches_source:
        required: false
        type: boolean
        default: false
      cache_scope:
        required: true
        type: string
      context_path:
        required: false
        type: string
        default: .
      context_from:
        required: false
        type: string
        default: current
      source_repository:
        required: false
        type: string
        default: ''
      source_ref:
        required: false
        type: string
        default: ''
      dockerfile:
        required: false
        type: string
        default: ''
      dockerfile_amd64:
        required: false
        type: string
        default: ''
      dockerfile_arm64:
        required: false
        type: string
        default: ''
      dockerfile_from:
        required: false
        type: string
        default: context
      platforms:
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      build_args:
        required: false
        type: string
        default: ''
      publish_dockerhub:
        required: false
        type: boolean
        default: true
      sync_dockerhub_readme:
        required: false
        type: boolean
        default: true
      dockerhub_readme_path:
        required: false
        type: string
        default: ''
      short_description:
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  check-source:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      source_revision: ${{ steps.source.outputs.source_revision }}
    steps:
      - name: Resolve source revision
        id: source
        if: ${{ inputs.source_repository != '' }}
        shell: bash
        run: |
          set -euo pipefail
          source_revision="$(git ls-remote https://github.com/${{ inputs.source_repository }}.git refs/heads/${{ inputs.source_ref }} | awk '{print $1}')"
          if [ -z "$source_revision" ]; then
            echo "::error::Failed to resolve source revision for ${{ inputs.source_repository }} ref ${{ inputs.source_ref }}."
            exit 1
          fi
          echo "source_revision=$source_revision" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        if: ${{ inputs.skip_if_image_revision_matches_source && inputs.publish_dockerhub && github.event_name == 'schedule' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compare latest image revision
        id: compare
        shell: bash
        run: |
          set -euo pipefail

          if [ '${{ inputs.skip_if_image_revision_matches_source }}' != 'true' ]; then
            echo 'should_build=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z '${{ inputs.source_repository }}' ] || [ -z '${{ steps.source.outputs.source_revision }}' ]; then
            echo '::error::skip_if_image_revision_matches_source requires source_repository/source_ref.'
            exit 1
          fi
          if [ '${{ inputs.publish_dockerhub }}' != 'true' ]; then
            echo '::error::skip_if_image_revision_matches_source requires publish_dockerhub=true.'
            exit 1
          fi

          image='${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.image_tag }}'
          current_revision='${{ steps.source.outputs.source_revision }}'

          existing_revision=''
          if docker pull "$image" >/dev/null 2>&1; then
            existing_revision="$(docker image inspect "$image" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' 2>/dev/null || true)"
          fi

          {
            echo "### Scheduled Source Check"
            echo "- Source revision: \`$current_revision\`"
            if [ -n "$existing_revision" ]; then
              echo "- Image revision: \`$existing_revision\`"
            else
              echo "- Image revision: not found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$current_revision" = "$existing_revision" ]; then
            echo 'should_build=false' >> "$GITHUB_OUTPUT"
            echo '- Decision: skip build' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'should_build=true' >> "$GITHUB_OUTPUT"
            echo '- Decision: build image' >> "$GITHUB_STEP_SUMMARY"
          fi

  setup-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          IFS=',' read -ra ADDR <<< "${{ inputs.platforms }}"
          JSON="["
          for i in "${ADDR[@]}"; do JSON+="\"$i\","; done
          JSON="${JSON%,}]"
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"

  build:
    needs: [check-source, setup-matrix]
    if: ${{ needs.check-source.outputs.should_build == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          path: current
          fetch-depth: 1

      - name: Checkout source repository
        if: ${{ inputs.source_repository != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repository }}
          ref: ${{ inputs.source_ref }}
          path: current/.sources/source
          fetch-depth: 1

      - name: Prepare
        shell: bash
        run: |
          set -euo pipefail

          platform='${{ matrix.platform }}'
          platform_pair="${platform//\//-}"
          echo "PLATFORM_PAIR=$platform_pair" >> "$GITHUB_ENV"
          echo "CACHE_SCOPE=${{ inputs.cache_scope }}-$platform_pair" >> "$GITHUB_ENV"

          current_root='current'
          source_root='current/.sources/source'
          source_metadata_root="$current_root"
          source_repository_url='${{ github.server_url }}/${{ github.repository }}'
          if [ -n '${{ inputs.source_repository }}' ]; then
            source_metadata_root="$source_root"
            source_repository_url='${{ github.server_url }}/${{ inputs.source_repository }}'
          fi

          case '${{ inputs.context_from }}' in
            current)
              context_root="$current_root"
              ;;
            source)
              if [ ! -d "$source_root" ]; then
                echo '::error::context_from=source requires source_repository.'
                exit 1
              fi
              context_root="$source_root"
              ;;
            *)
              echo '::error::context_from must be current or source.'
              exit 1
              ;;
          esac

          context_path="$context_root"
          if [ -n '${{ inputs.context_path }}' ] && [ '${{ inputs.context_path }}' != '.' ]; then
            context_path="$context_root/${{ inputs.context_path }}"
          fi

          if [ ! -d "$context_path" ]; then
            echo "::error::Build context not found: $context_path"
            exit 1
          fi

          source_revision="$(git -C "$source_metadata_root" rev-parse HEAD)"

          dockerfile='${{ inputs.dockerfile }}'
          if [ "$platform" = 'linux/amd64' ] && [ -n '${{ inputs.dockerfile_amd64 }}' ]; then
            dockerfile='${{ inputs.dockerfile_amd64 }}'
          fi
          if [ "$platform" = 'linux/arm64' ] && [ -n '${{ inputs.dockerfile_arm64 }}' ]; then
            dockerfile='${{ inputs.dockerfile_arm64 }}'
          fi

          dockerfile_path=''
          if [ -n "$dockerfile" ]; then
            case '${{ inputs.dockerfile_from }}' in
              context)
                dockerfile_root="$context_path"
                ;;
              current)
                dockerfile_root="$current_root"
                ;;
              source)
                if [ ! -d "$source_root" ]; then
                  echo '::error::dockerfile_from=source requires source_repository.'
                  exit 1
                fi
                dockerfile_root="$source_root"
                ;;
              *)
                echo '::error::dockerfile_from must be context, current, or source.'
                exit 1
                ;;
            esac
            dockerfile_path="$dockerfile_root/$dockerfile"
            if [ ! -f "$dockerfile_path" ]; then
              echo "::error::Dockerfile not found: $dockerfile_path"
              exit 1
            fi
          fi

          echo "BUILD_CONTEXT=$context_path" >> "$GITHUB_ENV"
          echo "DOCKERFILE_PATH=$dockerfile_path" >> "$GITHUB_ENV"
          dockerhub_image='${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}'
          echo "DOCKERHUB_IMAGE=$dockerhub_image" >> "$GITHUB_ENV"
          echo "SOURCE_REVISION=$source_revision" >> "$GITHUB_ENV"
          echo "SOURCE_REPOSITORY_URL=$source_repository_url" >> "$GITHUB_ENV"

          metadata_images=''
          if [ '${{ inputs.publish_dockerhub }}' = 'true' ]; then
            metadata_images="$metadata_images"$'\n'"$dockerhub_image"
          fi
          metadata_images="${metadata_images#$'\n'}"
          if [ -z "$metadata_images" ]; then
            echo '::error::Docker Hub publishing must be enabled.'
            exit 1
          fi
          {
            echo 'METADATA_IMAGES<<EOF'
            echo "$metadata_images"
            echo 'EOF'
          } >> "$GITHUB_ENV"

          {
            echo 'BUILD_LABELS<<EOF'
            echo "org.opencontainers.image.revision=$source_revision"
            echo "org.opencontainers.image.source=$source_repository_url"
            echo 'EOF'
          } >> "$GITHUB_ENV"

          {
            echo "### Build Inputs"
            echo "- Platform: \`$platform\`"
            echo "- Context: \`$context_path\`"
            if [ '${{ inputs.publish_dockerhub }}' = 'true' ]; then
              echo "- Docker Hub image: \`$dockerhub_image:${{ inputs.image_tag }}\`"
            fi
            echo "- Source: \`$source_repository_url@$source_revision\`"
            if [ -n "$dockerfile_path" ]; then
              echo "- Dockerfile: \`$dockerfile_path\`"
            else
              echo "- Dockerfile: \`Dockerfile\` from context"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.METADATA_IMAGES }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Login to Docker Hub
        if: ${{ inputs.publish_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker Hub image by digest
        id: build-dockerhub
        if: ${{ inputs.publish_dockerhub }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: ${{ matrix.platform }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            ${{ env.BUILD_LABELS }}
          build-args: |
            ${{ inputs.build_args }}
          outputs: type=image,name=${{ env.DOCKERHUB_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Export Docker Hub digest
        if: ${{ inputs.publish_dockerhub }}
        run: |
          mkdir -p /tmp/dockerhub-digests
          digest="${{ steps.build-dockerhub.outputs.digest }}"
          touch "/tmp/dockerhub-digests/${digest#sha256:}"

      - name: Upload Docker Hub digest
        if: ${{ inputs.publish_dockerhub }}
        uses: actions/upload-artifact@v4
        with:
          name: dockerhub-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/dockerhub-digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    needs:
      - build
    env:
      DOCKERHUB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}
    steps:
      - name: Download Docker Hub digests
        if: ${{ inputs.publish_dockerhub }}
        uses: actions/download-artifact@v4
        with:
          path: /tmp/dockerhub-digests
          pattern: dockerhub-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ inputs.publish_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create Docker Hub manifest list and push
        if: ${{ inputs.publish_dockerhub }}
        working-directory: /tmp/dockerhub-digests
        run: |
          docker buildx imagetools create --tag ${{ env.DOCKERHUB_IMAGE }}:${{ inputs.image_tag }} \
            $(printf '${{ env.DOCKERHUB_IMAGE }}@sha256:%s ' *)

      - name: Inspect Docker Hub image
        if: ${{ inputs.publish_dockerhub }}
        run: |
          docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:${{ inputs.image_tag }}

  sync-dockerhub-readme:
    runs-on: ubuntu-24.04
    needs:
      - merge
    if: ${{ inputs.publish_dockerhub && inputs.sync_dockerhub_readme }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          path: current
          fetch-depth: 1

      - name: Checkout source repository
        if: ${{ inputs.source_repository != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repository }}
          ref: ${{ inputs.source_ref }}
          path: current/.sources/source
          fetch-depth: 1

      - name: Select Docker Hub README
        id: readme
        shell: bash
        run: |
          set -euo pipefail

          current_root='current'
          source_root='current/.sources/source'

          find_readme() {
            local dir="$1"
            [ -d "$dir" ] || return 1
            find "$dir" -maxdepth 1 -type f \( -iname 'README' -o -iname 'README.*' \) | sort | head -n 1
          }

          add_candidate() {
            local candidate="$1"
            [ -n "$candidate" ] || return 0
            printf '%s\n' "$candidate" >> /tmp/readme-candidates
          }

          : > /tmp/readme-candidates

          explicit_readme='${{ inputs.dockerhub_readme_path }}'
          if [ -n "$explicit_readme" ]; then
            add_candidate "$explicit_readme"
            add_candidate "$current_root/$explicit_readme"
            if [ -d "$source_root" ]; then
              add_candidate "$source_root/$explicit_readme"
            fi
          else
            context_root="$current_root"
            if [ '${{ inputs.context_from }}' = 'source' ]; then
              context_root="$source_root"
            fi

            context_path="$context_root"
            if [ -n '${{ inputs.context_path }}' ] && [ '${{ inputs.context_path }}' != '.' ]; then
              context_path="$context_root/${{ inputs.context_path }}"
            fi

            dockerfile='${{ inputs.dockerfile }}'
            if [ -z "$dockerfile" ] && [ -n '${{ inputs.dockerfile_amd64 }}' ]; then
              dockerfile='${{ inputs.dockerfile_amd64 }}'
            fi
            if [ -z "$dockerfile" ] && [ -n '${{ inputs.dockerfile_arm64 }}' ]; then
              dockerfile='${{ inputs.dockerfile_arm64 }}'
            fi

            if [ '${{ inputs.dockerfile_from }}' = 'source' ]; then
              add_candidate "$(find_readme "$context_path" || true)"
              add_candidate "$(find_readme "$source_root" || true)"
            elif [ '${{ inputs.dockerfile_from }}' = 'current' ] && [ -n '${{ inputs.source_repository }}' ]; then
              if [ -n "$dockerfile" ]; then
                add_candidate "$(find_readme "$current_root/$(dirname "$dockerfile")" || true)"
              fi
              add_candidate "$(find_readme "$context_path" || true)"
              add_candidate "$(find_readme "$source_root" || true)"
            else
              add_candidate "$(find_readme "$context_path" || true)"
              if [ -n "$dockerfile" ] && [ '${{ inputs.dockerfile_from }}' = 'current' ]; then
                add_candidate "$(find_readme "$current_root/$(dirname "$dockerfile")" || true)"
              fi
            fi
          fi

          selected_readme=''
          while IFS= read -r candidate; do
            if [ -f "$candidate" ]; then
              selected_readme="$candidate"
              break
            fi
          done < /tmp/readme-candidates

          if [ -z "$selected_readme" ]; then
            echo 'readme_found=false' >> "$GITHUB_OUTPUT"
            {
              echo '### Docker Hub README'
              echo '- README: not found; skipped Docker Hub description sync.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          build_repository_url='${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}'
          source_repository_url="$build_repository_url"
          if [ -n '${{ inputs.source_repository }}' ]; then
            source_repository_url='${{ github.server_url }}/${{ inputs.source_repository }}/tree/${{ inputs.source_ref }}'
          fi

          {
            echo "Source repository: $source_repository_url"
            echo "Build repository: $build_repository_url"
            echo
            echo '---'
            echo
            cat "$selected_readme"
          } > /tmp/dockerhub-readme.md
          echo 'readme_found=true' >> "$GITHUB_OUTPUT"
          echo 'readme_filepath=/tmp/dockerhub-readme.md' >> "$GITHUB_OUTPUT"

          short_description='${{ inputs.short_description }}'
          if [ -z "$short_description" ]; then
            if [ -n '${{ inputs.source_repository }}' ]; then
              short_description='Forked build of ${{ inputs.source_repository }}'
            else
              short_description='Docker image built from ${{ github.repository }}'
            fi
          fi
          echo "short_description=$short_description" >> "$GITHUB_OUTPUT"

          {
            echo '### Docker Hub README'
            echo "- README: \`$selected_readme\`"
            echo "- Header: source repository \`$source_repository_url\`, build repository \`$build_repository_url\`"
            echo "- Short description: \`$short_description\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update Docker Hub README
        if: ${{ steps.readme.outputs.readme_found == 'true' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}
          short-description: ${{ steps.readme.outputs.short_description }}
          readme-filepath: ${{ steps.readme.outputs.readme_filepath }}
