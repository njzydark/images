name: Build Docker New Api Image

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  call:
    uses: ./.github/workflows/reusable-docker-image.yaml
    secrets: inherit
    with:
      image_name: new-api
      image_tag: latest
      skip_if_image_revision_matches_source: true
      cache_scope: new-api
      source_repository: njzydark/new-api
      source_ref: self-use
      context_from: source
      context_path: .
      dockerfile_from: source
      dockerfile: Dockerfile
