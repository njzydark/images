name: Build Dev Image Mise Image
on:
  workflow_run:
    workflows: ["Build Dev Image Base Image"]
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - 'dev-images/mise/Dockerfile'
  workflow_dispatch:

jobs:
  call:
    uses: ./.github/workflows/reusable-docker-image.yaml
    secrets: inherit
    with:
      image_name: dev-image
      image_tag: mise
      cache_scope: dev-image-mise
      context_path: dev-images/mise
      dockerfile: Dockerfile
